<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard - Hosles</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@400;500;600&family=Noto+Sans+Gujarati:wght@400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--green:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--amber:#BA7517;--al:#FAEEDA;--blue:#185FA5;--bl:#E6F1FB;--red:#A32D2D;--rl:#FCEBEB;--text:#1a1a1a;--muted:#666;--border:#e8e8e8;--bg:#f4f6f4}
  body{font-family:'Hind',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .header{background:var(--gd);color:white;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
  .header h1{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800}
  .header p{font-size:11px;opacity:.8;margin-top:1px}
  .refresh-btn{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Hind',sans-serif}
  .tabs{display:flex;background:white;border-bottom:2px solid var(--border)}
  .tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;font-weight:600;font-family:'Hind',sans-serif;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
  .tab.active{color:var(--gd);border-bottom-color:var(--gd)}
  .page{display:none}.page.active{display:block}

  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
  .stat-card{background:white;border-radius:12px;padding:12px;border:1px solid var(--border);text-align:center}
  .stat-card .num{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:var(--gd);line-height:1}
  .stat-card .lbl{font-size:11px;color:var(--muted);margin-top:3px}

  /* Date filter bar */
  .date-bar{padding:0 14px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .date-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Hind',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
  .date-chip.active{background:var(--gd);color:white;border-color:var(--gd)}
  .date-input{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Hind',sans-serif;font-size:13px;color:var(--text);outline:none;cursor:pointer}
  .date-input:focus{border-color:var(--gd)}

  /* Status filter */
  .status-bar{padding:0 14px 10px;display:flex;gap:7px;flex-wrap:wrap}
  .filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Hind',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted)}
  .filter-btn.active{background:var(--gd);color:white;border-color:var(--gd)}

  /* Orders */
  .orders-list{padding:0 14px 80px}
  .order-card{background:white;border-radius:12px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;display:flex;align-items:stretch}
  .order-left-bar{width:5px;flex-shrink:0}
  .bar-Pending{background:var(--amber)}.bar-Confirmed{background:var(--blue)}.bar-Delivered{background:var(--gd)}.bar-Cancelled{background:var(--red)}
  .order-body{flex:1;padding:13px 14px}
  .order-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .shop-name{font-size:16px;font-weight:700;color:var(--text)}
  .order-amount{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--gd)}
  .order-row2{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .order-meta{font-size:12px;color:var(--muted);line-height:1.6}
  .order-meta span{display:inline-block;margin-right:10px}
  .status-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0}
  .status-Pending{background:var(--al);color:var(--amber)}.status-Confirmed{background:var(--bl);color:var(--blue)}
  .status-Delivered{background:var(--gl);color:var(--gd)}.status-Cancelled{background:var(--rl);color:var(--red)}
  .order-actions{display:flex;gap:7px;justify-content:flex-end}
  .btn-bill{background:var(--gd);color:white;border:none;padding:7px 14px;border-radius:8px;font-family:'Hind',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
  .btn-status{background:white;color:var(--blue);border:1.5px solid var(--blue);padding:7px 14px;border-radius:8px;font-family:'Hind',sans-serif;font-size:12px;font-weight:600;cursor:pointer}

  /* Manage pages */
  .manage-page{padding:14px}
  .add-card{background:white;border-radius:14px;border:1px solid var(--border);padding:18px;margin-bottom:14px}
  .add-card h3{font-family:'Baloo 2',cursive;font-size:16px;font-weight:700;color:var(--gd);margin-bottom:14px}
  .input-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
  .input-row input{flex:1;min-width:110px;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Hind',sans-serif;font-size:14px;outline:none}
  .input-row input:focus{border-color:var(--gd)}
  .green-btn{background:var(--gd);color:white;border:none;padding:11px 18px;border-radius:10px;font-family:'Hind',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
  .green-btn:disabled{background:#aaa;cursor:not-allowed}
  .list-card{background:white;border-radius:14px;border:1px solid var(--border);overflow:hidden}
  .list-header{font-family:'Baloo 2',cursive;font-size:16px;font-weight:700;color:var(--gd);padding:14px 18px 10px;border-bottom:1px solid var(--border)}
  .list-item{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border)}
  .list-item:last-child{border-bottom:none}
  .list-item-name{font-size:15px;font-weight:600}
  .list-item-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .price-tag{font-family:'Baloo 2',cursive;font-size:16px;font-weight:700;color:var(--gd)}
  .del-btn{background:var(--rl);color:var(--red);border:none;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Hind',sans-serif}
  .empty-list{padding:30px;text-align:center;color:var(--muted);font-size:14px}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center;padding:20px}
  .modal{background:white;border-radius:16px;padding:22px;width:100%;max-width:360px}
  .modal h3{font-family:'Baloo 2',cursive;font-size:17px;font-weight:700;margin-bottom:14px;color:var(--gd)}
  .modal select{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:10px;font-family:'Hind',sans-serif;font-size:15px;margin-bottom:14px;outline:none}
  .modal-btns{display:flex;gap:10px}
  .modal-btns button{flex:1;padding:11px;border-radius:10px;font-family:'Hind',sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none}
  .btn-save{background:var(--gd);color:white}.btn-cancel{background:#f0f0f0;color:var(--text)}

  .loading-screen{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);display:none}
  /* Stock update modal */
  .stock-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center;padding:20px}
  .stock-modal{background:white;border-radius:16px;padding:24px;width:100%;max-width:380px}
  .stock-modal h3{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;color:var(--gd);margin-bottom:6px}
  .stock-modal .prod-info{font-size:13px;color:var(--muted);margin-bottom:16px;padding:10px 12px;background:var(--gl);border-radius:8px}
  .stock-modal .field{margin-bottom:14px}
  .stock-modal label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:5px}
  .stock-modal input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Hind',sans-serif;font-size:15px;outline:none}
  .stock-modal input:focus{border-color:var(--gd)}
  .stock-modal-btns{display:flex;gap:10px;margin-top:4px}
  .stock-modal-btns button{flex:1;padding:12px;border-radius:10px;font-family:'Hind',sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:white;padding:11px 22px;border-radius:10px;font-size:13px;display:none;z-index:200;white-space:nowrap}
  .toast.green{background:var(--gd)}.toast.red{background:var(--red)}.toast.gray{background:#333}
  .count-badge{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px}
</style>
</head>
<body>
<div class="header">
  <div><h1>&#128200; Hosles Dashboard</h1><p>Malik ka Control Panel</p></div>
  <button class="refresh-btn" onclick="refreshCurrent()">&#8635; Refresh</button>
</div>
<div class="tabs">
  <button class="tab active" id="tab-orders" onclick="switchTab('orders')">&#128230; Orders</button>
  <button class="tab" id="tab-shops" onclick="switchTab('shops')">&#127978; Shops</button>
  <button class="tab" id="tab-products" onclick="switchTab('products')">&#127381; Products</button>
</div>

<!-- ORDERS PAGE -->
<div class="page active" id="page-orders">
  <div id="loadingScreen" class="loading-screen"><div class="spinner"></div><p>Orders load ho rahe hain...</p></div>
  <div id="ordersContent" style="display:none">
    <div class="stats-row">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Aaj ke Orders</div></div>
      <div class="stat-card"><div class="num" id="statPending">0</div><div class="lbl">Pending</div></div>
      <div class="stat-card"><div class="num" id="statRevenue">&#8377;0</div><div class="lbl">Aaj ka Rakam</div></div>
    </div>

    <!-- Date filter -->
    <div class="date-bar">
      <button class="date-chip active" id="chip-today" onclick="setDateFilter('today',this)">Aaj</button>
      <button class="date-chip" id="chip-yesterday" onclick="setDateFilter('yesterday',this)">Kal</button>
      <button class="date-chip" id="chip-week" onclick="setDateFilter('week',this)">Is Hafte</button>
      <button class="date-chip" id="chip-all" onclick="setDateFilter('all',this)">Sab</button>
      <input type="date" class="date-input" id="customDate" onchange="setDateFilter('custom',null)" title="Koi bhi din chunno" />
    </div>

    <!-- Status filter -->
    <div class="status-bar" style="justify-content:space-between;align-items:center">
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <button class="filter-btn active" onclick="setStatusFilter('All',this)">Sab</button>
        <button class="filter-btn" onclick="setStatusFilter('Pending',this)">Pending</button>
        <button class="filter-btn" onclick="setStatusFilter('Confirmed',this)">Confirmed</button>
        <button class="filter-btn" onclick="setStatusFilter('Delivered',this)">Delivered</button>
        <button class="filter-btn" onclick="setStatusFilter('Cancelled',this)">Cancelled</button>
      </div>
      <button onclick="downloadSummary()" id="summaryBtn"
        style="background:var(--gd);color:white;border:none;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Hind',sans-serif;display:inline-flex;align-items:center;gap:6px;white-space:nowrap">
        &#128229; Summary Download
      </button>
    </div>

    <div class="orders-list" id="ordersList"></div>
    <div class="empty-state" id="emptyState"><p style="font-size:36px">&#128230;</p><p style="margin-top:10px;font-size:15px">Is din koi order nahi mila</p></div>
  </div>
</div>

<!-- SHOPS PAGE -->
<div class="page" id="page-shops">
  <div class="manage-page">
    <div class="add-card">
      <h3>&#43; Naya Shop / Customer Jodo</h3>
      <div class="input-row" style="margin-bottom:10px">
        <input type="text" id="newShopName" placeholder="Shop ka naam *" style="flex:2;min-width:160px"/>
        <input type="tel" id="newShopPhone" placeholder="Phone number" maxlength="10"/>
      </div>
      <div class="input-row" style="margin-bottom:10px">
        <input type="text" id="newShopAddress" placeholder="Address (optional)" style="flex:2"/>
        <input type="text" id="newShopLocation" placeholder="Area (jaise: Sec-24)"/>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">

          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="newShopGps" placeholder="GPS: 23.123456,72.654321 (ya Live Location dabao)"
              style="flex:1;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:white;color:var(--text)"/>
            <button onclick="getShopLocation()" id="gpsBtn"
              style="background:var(--bl);color:var(--blue);border:none;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Hind',sans-serif">
              &#127757; Live Location

<!-- PRODUCTS PAGE -->

  <div class="manage-page">
    <div class="add-card">
      <h3>&#43; Naya Product Jodo</h3>
      <div class="input-row" style="margin-bottom:10px">
        <input type="text" id="newProdName" placeholder="Product ka naam *" style="flex:2;min-width:150px"/>
        <input type="number" id="newProdPrice" placeholder="Sale Price &#8377; *" min="0" step="0.01"/>
      </div>
      <div class="input-row" style="margin-bottom:10px">
        <input type="number" id="newProdMrp" placeholder="MRP &#8377;" min="0" step="0.01"/>
        <input type="number" id="newProdPurchasePrice" placeholder="Purchase Price &#8377;" min="0" step="0.01"/>
      </div>
      <div class="input-row">
        <input type="number" id="newProdStock" placeholder="Stock (quantity)" min="0"/>
        <button class="green-btn" id="addProdBtn" onclick="addProduct()">&#10003; Jodo</button>
      </div>
    </div>
    <div class="list-card">
      <div class="list-header">&#128230; Products List</div>
      <div id="productsList"><div class="empty-list"><div class="spinner" style="margin:20px auto"></div></div></div>
    </div>
  </div>
</div>

<!-- Stock Update Modal -->
<div class="stock-modal-overlay" id="stockModal">
  <div class="stock-modal">
    <h3>&#128230; Stock Update Karo</h3>
    <div class="prod-info" id="stockProdInfo">Product info yahan</div>
    <div class="field">
      <label>Kitna naya maal aaya? (Quantity)</label>
      <input type="number" id="stockAddQty" placeholder="Jaise: 100" min="1" />
    </div>
    <div class="field">
      <label>Purchase Price (Ek item ka) &#8377;</label>
      <input type="number" id="stockPurchasePrice" placeholder="Jaise: 11.50" min="0" step="0.01" />
    </div>
    <div class="stock-modal-btns">
      <button style="background:#f0f0f0;color:#333" onclick="closeStockModal()">Cancel</button>
      <button style="background:var(--gd);color:white" onclick="saveStockUpdate()">&#10003; Stock Jodo</button>
    </div>
  </div>
</div>

<!-- Status Modal -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <h3>Status Update Karo</h3>
    <select id="statusSelect">
      <option value="Pending">Pending</option>
      <option value="Confirmed">Confirmed</option>
      <option value="Delivered">Delivered</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveStatus()">Save Karo</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzS2g3oO8TljjIrpXZ-t9xc020VrZ-MvIm2c9HfIWPIL-IcZJA9B38kRTMjQTMNN9lT/exec";
let allOrders=[],editingOrderId=null,currentTab='orders';
let activeDateFilter='today', activeStatusFilter='All';

function apiCall(params){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Date.now()+"_"+Math.floor(Math.random()*9999);
    const q=Object.entries({...params,callback:cb,t:Date.now()}).map(([k,v])=>encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
    const s=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("Timeout"))},15000);
    window[cb]=(d)=>{cleanup();resolve(d)};
    function cleanup(){clearTimeout(timer);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s)}
    s.onerror=()=>{cleanup();reject(new Error("Error"))};
    s.src=API_URL+"?"+q;document.head.appendChild(s);
  });
}

function toLocalDateStr(dateStr){
  if(!dateStr) return "";
  try{
    // Indian format: "12/6/2026, 11:17 AM" = day/month/year
    const datePart = dateStr.split(",")[0].trim();
    if(datePart.indexOf("/") > -1){
      const parts = datePart.split("/");
      const d = parseInt(parts[0]);
      const m = parseInt(parts[1]);
      const y = parseInt(parts[2]);
      if(!isNaN(d)&&!isNaN(m)&&!isNaN(y)&&y>2000){
        return y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");
      }
    }
    // ISO format: "2026-12-06T05:47:51.000Z"
    // Apps Script en-IN locale on server gives ISO sometimes
    // "2026-12-06" = Apps stored Indian date 12/6 as yyyy-dd-mm (WRONG ISO)
    // So we must treat ISO parts as: yyyy - day - month (swapped!)
    if(dateStr.indexOf("T") > -1){
      const isoPart = dateStr.split("T")[0];
      const p = isoPart.split("-");
      if(p.length===3){
        const y=parseInt(p[0]);
        const part2=parseInt(p[1]); // this is actually DAY in Indian date
        const part3=parseInt(p[2]); // this is actually MONTH in Indian date
        // Swap: treat p[1] as day, p[2] as month
        return y+"-"+String(part3).padStart(2,"0")+"-"+String(part2).padStart(2,"0");
      }
    }
  }catch(e){}
  return "";
}

function todayStr(){
  const n=new Date();
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}

function yesterdayStr(){
  const n=new Date();n.setDate(n.getDate()-1);
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}

function weekStartStr(){
  const n=new Date();n.setDate(n.getDate()-6);
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='products') loadProducts();
  if(tab==='shops') loadShops();
}

function refreshCurrent(){
  if(currentTab==='orders') loadOrders();
  else if(currentTab==='shops') loadShops();
  else loadProducts();
}

/* ---- DATE & STATUS FILTER ---- */
function setDateFilter(type, btn){
  activeDateFilter=type;
  document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else{ document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active')); }
  applyFilters();
}

function setStatusFilter(status, btn){
  activeStatusFilter=status;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters(){
  let filtered=[...allOrders];
  // Date filter
  const today=todayStr(), yesterday=yesterdayStr(), weekStart=weekStartStr();
  const customDate=document.getElementById("customDate").value;
  if(activeDateFilter==='today'){
    filtered=filtered.filter(o=>toLocalDateStr(o["Date"]||"")===today);
  } else if(activeDateFilter==='yesterday'){
    filtered=filtered.filter(o=>toLocalDateStr(o["Date"]||"")===yesterday);
  } else if(activeDateFilter==='week'){
    filtered=filtered.filter(o=>{const d=toLocalDateStr(o["Date"]||"");return d>=weekStart&&d<=today;});
  } else if(activeDateFilter==='custom'&&customDate){
    filtered=filtered.filter(o=>toLocalDateStr(o["Date"]||"")===customDate);
  }
  // Status filter
  if(activeStatusFilter!=='All') filtered=filtered.filter(o=>o["Status"]===activeStatusFilter);
  window._currentFiltered = filtered;
  renderOrders(filtered);
  updateStats(filtered);
}

/* ---- SUMMARY DOWNLOAD ---- */
function getFilterLabel(){
  const labels={today:"Aaj",yesterday:"Kal",week:"Is Hafte",all:"Sab",custom:document.getElementById("customDate").value};
  let dl = labels[activeDateFilter] || "Sab";
  let sl = activeStatusFilter==='All' ? '' : ' - '+activeStatusFilter;
  return dl+sl;
}

function downloadSummary(){

function getAmt(o){
  // Sheet columns: Order ID, Date, Salesman, Customer Name, Customer Phone, Items, Total Amount, Status, Notes
  // "Total Amount" is column G (index 6 in 0-based object values)
  const vals=Object.values(o);
  // Index 6 = Total Amount
  if(vals[6]!==undefined && vals[6]!==""){const v=parseFloat(vals[6]);if(!isNaN(v))return v;}
  // Fallback: try by key name
  for(const k of Object.keys(o)){
    if(k.trim()==="Total Amount"||k.trim()==="totalAmount"){
      const v=parseFloat(o[k]);if(!isNaN(v))return v;
    }
  }
  return 0;
}

/* ---- BILL - MEET ENTERPRISE FORMAT ---- */
async function generateBill(order){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:"mm",format:"a5",orientation:"portrait"});
  const PW=148, PH=210, ML=8, MR=8, MW=PW-ML-MR;

  function setT(r,g,b){doc.setTextColor(r,g,b);}
  function resetT(){doc.setTextColor(0,0,0);}
  function hline(y,lw){doc.setLineWidth(lw||0.3);doc.setDrawColor(0,0,0);doc.line(ML,y,ML+MW,y);}
  function dline(y){doc.setLineWidth(0.2);doc.setDrawColor(140,140,140);doc.line(ML,y,ML+MW,y);}
  function t(str,x,y,sz,bold,al){
    doc.setFontSize(sz||7.5);doc.setFont("helvetica",bold?"bold":"normal");resetT();
    doc.text(String(str==null?"":str),x,y,{align:al||"left",baseline:"middle"});
  }
  function tr(str,x,y,sz,bold){t(str,x,y,sz,bold,"right");}
  function tc(str,x,y,sz,bold){t(str,x,y,sz,bold,"center");}

  // Parse items
  const rawItems=(order["Items"]||"").split(" | ");
  const items=[];
  // Keep Gujarati item names as-is (only clean symbols/whitespace).
  // Gujarati text is drawn via an offscreen canvas (Noto Sans Gujarati font)
  // so it renders correctly in the PDF instead of getting transliterated.
  function sanitize(str){
    if(!str) return "Item";
    str = str.replace(/₹/g,"Rs.").replace(/–/g,"-").replace(/—/g,"-");
    str = str.replace(/\s+/g," ");
    str = str.replace(/^\s+|\s+$/g,"");
    str = str.replace(/^[\s,.()\-]+|[\s,.()\-]+$/g,"");
    return str || "Item";
  }
  // Renders text containing non-ASCII (Gujarati) characters to a PNG using a
  // canvas, so jsPDF (which can't draw Gujarati glyphs natively) can place it
  // as an image. Returns {data, w, h} where w/h are the canvas pixel size.
  async function gujImg(str, fontPx){
    fontPx = fontPx || 42;
    const fontSpec = "600 "+fontPx+"px 'Noto Sans Gujarati'";
    try{ await document.fonts.load(fontSpec, str); }catch(e){}
    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");
    ctx.font=fontSpec;
    let w=Math.ceil(ctx.measureText(str).width)+8;
    let h=Math.ceil(fontPx*1.35);
    canvas.width=w; canvas.height=h;
    ctx.font=fontSpec;
    ctx.fillStyle="#000";
    ctx.textBaseline="middle";
    ctx.clearRect(0,0,w,h);
    ctx.fillText(str, 3, h/2+1);
    return {data:canvas.toDataURL("image/png"), w, h};
  }
  function hasGujarati(str){ return /[^ -~]/.test(str); }
  rawItems.forEach(ln=>{
    const m=ln.match(/^(.+?) x([\d.]+) @[₹Rs.]*([\d.]+)/);
    if(m){const qty=parseFloat(m[2]),rate=parseFloat(m[3]),amt=qty*rate;
      items.push({name:sanitize(m[1].trim()),qty,rate,amt});}
  });

  // Look up MRP for each item from the products list (matched by name)
  let mrpMap={};
  try{
    const pd=await apiCall({action:"getProducts"});
    if(pd && pd.success && pd.products){
      pd.products.forEach(p=>{ if(p.name) mrpMap[sanitize(p.name)]=parseFloat(p.mrp)||0; });
    }
  }catch(e){}
  items.forEach(item=>{ item.mrp = mrpMap[item.name] || 0; });

  const grandTotal=getAmt(order);
  // Fix date display - handle all formats
  let dateRaw = "";
  const rawDate = order["Date"] || "";
  if(rawDate.indexOf("T") > -1 || rawDate.indexOf("Z") > -1){
    // ISO format: 2026-12-06T05:47:51.000Z
    const dt = new Date(rawDate);
    if(!isNaN(dt)){
      dateRaw = String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0")+"/"+dt.getFullYear();
    } else dateRaw = rawDate.split("T")[0];
  } else {
    dateRaw = rawDate.split(",")[0] || rawDate;
  }
  const orderIdShort=(order["Order ID"]||"").replace("ORD-","").slice(-6);
  const invNo="A"+orderIdShort.padStart(6,"0");
  const salesman=(order["Salesman"]||"").toUpperCase();
  const custName=(order["Customer Name"]||"").toUpperCase();
  let custPhone=order["Customer Phone"]||"";
  let custAddress=order["Customer Address"]||order["Address"]||"";
  try{
    const sd=await apiCall({action:"getShops"});
    if(sd && sd.success && sd.shops){
      const shopNameLc=(order["Customer Name"]||"").trim().toLowerCase();
      const match=sd.shops.find(s=>(s.name||"").trim().toLowerCase()===shopNameLc);
      if(match){
        if(!custAddress){
          const parts=[match.address,match.area].filter(Boolean);
          custAddress=parts.join(", ");
        }
        if(!custPhone && match.phone) custPhone=match.phone;
      }
    }
  }catch(e){}

  // ===== PAGE MANAGEMENT =====
  const PAGE_BOTTOM = PH - 14; // 14mm bottom margin
  const rowH = 6;
  // How much space the footer needs (outstanding + signatory section)
  const FOOTER_H = 30;

  function needNewPage(spaceNeeded){
    return (y + spaceNeeded) > PAGE_BOTTOM;
  }

  // Columns for A5
  const C={
    sn:   {x:ML,      w:6},
    name: {x:ML+6,    w:50},
    qty:  {x:ML+56,   w:10},
    rate: {x:ML+66,   w:16},
    mrp:  {x:ML+82,   w:12},
    amt:  {x:ML+94,   w:MW-94},
  };
  function cx(col){return C[col].x+C[col].w-1;}
  function lx(col){return C[col].x+1;}
  function mx(col){return C[col].x+C[col].w/2;}

  function drawTableHeader(yy){
    doc.setFillColor(230,230,230);doc.rect(ML,yy-1,MW,6,"F");
    t("Sn.",     lx("sn"),   yy+2, 6.5, true);
    t("Item",    lx("name"), yy+2, 6.5, true);
    tc("Qty",    mx("qty"),  yy+2, 6.5, true);
    tr("Rate",   cx("rate"), yy+2, 6.5, true);
    tc("MRP",    mx("mrp"),  yy+2, 6.5, true);
    tr("Amount", cx("amt"),  yy+2, 6.5, true);
    yy+=5; hline(yy,0.5); yy+=2;
    return yy;
  }

  function addContinuationPage(){
    doc.addPage();
    let yy=8;
    hline(yy,0.7); yy+=2;
    t("MEET ENTERPRISE", ML, yy+4, 11, true); yy+=8;
    setT(80,80,80);t("Invoice: "+invNo+"  |  "+custName+"  |  Continued...", ML, yy, 6);resetT(); yy+=4;
    hline(yy,0.7); yy+=3;
    yy = drawTableHeader(yy);
    return yy;
  }

  let y=8;

  // ===== HEADER =====
  const headerTop=y;
  hline(y,0.7); y+=2;
  t("MEET ENTERPRISE", ML, y+4, 13, true); y+=9;
  setT(80,80,80);t("SECTOR-24, GANDHINAGAR, GUJARAT", ML, y, 6.5);resetT(); y+=4;
  setT(80,80,80);t("Phone : 9429301154 / 6352341144", ML, y, 6.5);resetT(); y+=3;
  hline(y,0.7);
  // vertical divider in the middle of the header block
  doc.setLineWidth(0.7);doc.setDrawColor(0,0,0);doc.line(PW/2,headerTop,PW/2,y);
  // Right side of header: buyer/shop info
  t("TO: "+custName, PW/2+4, headerTop+5, 9, true);
  if(custAddress){ setT(80,80,80); t(custAddress, PW/2+4, headerTop+5+5, 6.5); resetT(); }
  if(custPhone){ setT(80,80,80); t("Ph: "+custPhone, PW/2+4, headerTop+5+10, 6.5); resetT(); }
  y+=4;

  // ===== SUPPLIER + INVOICE INFO =====
  t("INVOICE NO : "+invNo,  ML,      y, 7.5, true);
  tr("DATE : "+dateRaw,     ML+MW,   y, 7.5, true);
  y+=5;
  t("SALESMAN : "+salesman, ML,      y, 7.5);
  tr("PHONE : 9429301154 / 6352341144",  ML+MW,   y, 7.5);
  y+=4;
  hline(y,0.7); y+=3;

  // ===== TABLE HEADER (first page) =====
  y = drawTableHeader(y);

  // ===== ITEM ROWS =====
  let totalQty=0, totalAmt=0;
  for(let i=0;i<items.length;i++){
    const item=items[i];

    // Check if this row + footer will fit; if not, start new page
    // (for last few rows also ensure footer fits on same page as totals)
    const isLastRows = (i >= items.length - 1);
    const spaceNeeded = rowH + (isLastRows ? FOOTER_H + 14 : 0);
    if(needNewPage(spaceNeeded)){
      y = addContinuationPage();
    }

    if(i%2===0){doc.setFillColor(248,250,248);doc.rect(ML,y-1,MW,rowH,"F");}
    const cy2=y+rowH/2-1;
    const nameStr=item.name.length>30?item.name.substring(0,30):item.name;
    t((i+1)+".",         lx("sn"),   cy2, 7);
    if(hasGujarati(nameStr)){
      const img=await gujImg(nameStr,42);
      let targetH=3.0, targetW=img.w/img.h*targetH;
      const maxW=C["name"].w-2;
      if(targetW>maxW){ targetW=maxW; targetH=img.h/img.w*targetW; }
      doc.addImage(img.data,"PNG",lx("name"),cy2-targetH/2,targetW,targetH);
    } else {
      t(nameStr,         lx("name"), cy2, 7);
    }
    tc(item.qty,         mx("qty"),  cy2, 7);
    tr(item.rate.toFixed(2), cx("rate"), cy2, 7);
    tc(item.mrp?item.mrp.toFixed(2):"-", mx("mrp"),  cy2, 7);
    tr(item.amt.toFixed(2), cx("amt"), cy2, 7);
    totalQty+=item.qty; totalAmt+=item.amt;
    y+=rowH;
  }

  // If totals + footer won't fit, add new page
  if(needNewPage(FOOTER_H + 14)){
    y = addContinuationPage();
  }

  hline(y,0.5); y+=2;

  // ===== TOTALS ROW =====
  doc.setFillColor(230,230,230);doc.rect(ML,y-1,MW,6,"F");
  t("Items: "+items.length,  lx("sn"),   y+2, 7, true);
  tc("Qty: "+totalQty,       ML+MW/2,    y+2, 7, true);
  tr(totalAmt.toFixed(2),    cx("amt"),  y+2, 7, true);
  y+=6; hline(y,0.7); y+=3;

  // ===== OUTSTANDING =====
  t("OUTSTANDING : Rs. "+grandTotal.toFixed(2), ML, y, 8, true);
  tr("For, MEET ENTERPRISE", ML+MW, y, 7.5);
  y+=10;
  dline(y); y+=4;
  tr("(Authorised Signatory)", ML+MW, y, 7);
  y+=4; hline(y,0.7);

  doc.save("Bill_"+invNo+"_"+(order["Customer Name"]||"order").replace(/ /g,"_")+".pdf");
}

/* ---- GPS LOCATION ---- */
function getShopLocation(){
  const btn=document.getElementById("gpsBtn");
  const status=document.getElementById("gpsStatus");
  if(!navigator.geolocation){
    status.textContent="Aapka browser GPS support nahi karta.";
    status.style.color="#c62828";
    return;
  }
  btn.textContent="📡 Location mil rahi hai...";
  btn.style.background="#f0f0f0";
  btn.disabled=true;
  status.textContent="GPS dhundh raha hai...";
  status.style.color="var(--muted)";

  navigator.geolocation.getCurrentPosition(
    function(pos){
      const lat=pos.coords.latitude.toFixed(6);
      const lng=pos.coords.longitude.toFixed(6);
      document.getElementById("newShopGps").value=lat+","+lng;
      status.innerHTML='✅ Location mili! <a href="https://www.google.com/maps?q='+lat+','+lng+'" target="_blank" style="color:var(--blue)">Map pe dekho</a>';
      status.style.color="var(--gd)";
      btn.textContent="🌍 Live Location";
      btn.style.background="var(--bl)";
      btn.disabled=false;
    },
    function(err){
      let msg="Location nahi mili.";
      if(err.code===1) msg="Location permission do — browser settings mein allow karo.";
      else if(err.code===2) msg="GPS signal nahi mila. Bahar jao ya internet check karo.";
      else if(err.code===3) msg="Timeout — dobara try karo.";
      status.textContent=msg;
      status.style.color="#c62828";
      btn.textContent="🌍 Live Location";
      btn.style.background="var(--bl)";
      btn.disabled=false;
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge:0}
  );
}

/* ---- STOCK UPDATE ---- */
let editingStockId = null;

function openStockModal(id, name, currentStock){
  editingStockId = id;
  document.getElementById("stockProdInfo").innerHTML =
    "<strong>"+name+"</strong><br>Abhi ka Stock: <strong>"+currentStock+"</strong>";
  document.getElementById("stockAddQty").value = "";
  document.getElementById("stockPurchasePrice").value = "";
  document.getElementById("stockModal").style.display = "flex";
}

function closeStockModal(){
  document.getElementById("stockModal").style.display = "none";
  editingStockId = null;
}

async function saveStockUpdate(){
  const addQty = parseFloat(document.getElementById("stockAddQty").value);
  const purchasePrice = parseFloat(document.getElementById("stockPurchasePrice").value)||0;
  if(!addQty || addQty <= 0) return showToast("Quantity bharo!","red");
  try{
    const d = await apiCall({action:"updateStock", id:editingStockId, addQty, purchasePrice});
    if(d.success){
      showToast("Stock update ho gaya! Naya stock: "+d.newStock,"green");
      closeStockModal();
      loadProducts();
    } else showToast("Update nahi hua.","red");
  } catch(e){ showToast("Error. Dobara try karo.","red"); }
}

function showToast(msg,type){
  const el=document.getElementById("toast");el.textContent=msg;
  el.className="toast "+(type||"gray");el.style.display="block";
  setTimeout(()=>el.style.display="none",3000);
}

loadOrders();
