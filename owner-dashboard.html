<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard - Hosles</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE;
    --amber: #BA7517; --amber-light: #FAEEDA;
    --blue: #185FA5; --blue-light: #E6F1FB;
    --red: #A32D2D; --red-light: #FCEBEB;
    --text: #1a1a1a; --muted: #666; --border: #e8e8e8; --bg: #f4f6f4;
  }
  body { font-family: 'Hind', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--green-dark); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 800; }
  .header p { font-size: 11px; opacity: 0.8; margin-top: 1px; }
  .refresh-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Hind', sans-serif; }
  .tabs { display: flex; background: white; border-bottom: 2px solid var(--border); }
  .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 600; font-family: 'Hind', sans-serif; cursor: pointer; color: var(--muted); border: none; background: none; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }
  .page { display: none; }
  .page.active { display: block; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px; }
  .stat-card { background: white; border-radius: 12px; padding: 12px; border: 1px solid var(--border); text-align: center; }
  .stat-card .num { font-family: 'Baloo 2', cursive; font-size: 24px; font-weight: 800; color: var(--green-dark); line-height: 1; }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .filters { padding: 0 14px 10px; display: flex; gap: 7px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-family: 'Hind', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); }
  .filter-btn.active { background: var(--green-dark); color: white; border-color: var(--green-dark); }
  .orders-list { padding: 0 14px 80px; }
  .order-card { background: white; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
  .order-top { padding: 12px 14px 8px; display: flex; justify-content: space-between; align-items: flex-start; }
  .order-id { font-family: 'Baloo 2', cursive; font-size: 12px; font-weight: 700; color: var(--green-dark); }
  .order-date { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .status-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .status-Pending { background: var(--amber-light); color: var(--amber); }
  .status-Confirmed { background: var(--blue-light); color: var(--blue); }
  .status-Delivered { background: var(--green-light); color: var(--green-dark); }
  .status-Cancelled { background: var(--red-light); color: var(--red); }
  .order-customer { padding: 0 14px 6px; }
  .order-customer .cname { font-size: 15px; font-weight: 600; }
  .order-customer .cphone { font-size: 12px; color: var(--muted); }
  .order-salesman { padding: 0 14px 6px; font-size: 11px; color: var(--muted); }
  .order-items { background: #fafafa; border-top: 1px solid var(--border); padding: 8px 14px; font-size: 12px; color: var(--muted); line-height: 1.6; }
  .order-footer { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
  .order-total { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 800; color: var(--green-dark); }
  .action-btns { display: flex; gap: 7px; }
  .btn-bill { background: var(--green-dark); color: white; border: none; padding: 7px 12px; border-radius: 8px; font-family: 'Hind', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }
  .btn-status { background: white; color: var(--blue); border: 1.5px solid var(--blue); padding: 7px 12px; border-radius: 8px; font-family: 'Hind', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }
  .products-page { padding: 14px; }
  .add-product-card { background: white; border-radius: 14px; border: 1px solid var(--border); padding: 18px; margin-bottom: 14px; }
  .add-product-card h3 { font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 700; color: var(--green-dark); margin-bottom: 14px; }
  .prod-input-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .prod-input-row input { flex: 1; min-width: 120px; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Hind', sans-serif; font-size: 14px; outline: none; }
  .prod-input-row input:focus { border-color: var(--green); }
  .add-prod-btn { background: var(--green-dark); color: white; border: none; padding: 11px 20px; border-radius: 10px; font-family: 'Hind', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .add-prod-btn:disabled { background: #aaa; cursor: not-allowed; }
  .products-list-card { background: white; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
  .prod-list-header { font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 700; color: var(--green-dark); padding: 14px 18px 10px; border-bottom: 1px solid var(--border); }
  .product-item { display: flex; justify-content: space-between; align-items: center; padding: 13px 18px; border-bottom: 1px solid var(--border); }
  .product-item:last-child { border-bottom: none; }
  .product-name { font-size: 15px; font-weight: 600; }
  .product-price { font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 700; color: var(--green-dark); }
  .del-btn { background: var(--red-light); color: var(--red); border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Hind', sans-serif; }
  .empty-products { padding: 30px; text-align: center; color: var(--muted); font-size: 14px; }
  .loading-screen { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); display: none; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
  .modal { background: white; border-radius: 16px; padding: 22px; width: 100%; max-width: 360px; }
  .modal h3 { font-family: 'Baloo 2', cursive; font-size: 17px; font-weight: 700; margin-bottom: 14px; color: var(--green-dark); }
  .modal select { width: 100%; padding: 11px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Hind', sans-serif; font-size: 15px; margin-bottom: 14px; outline: none; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 11px; border-radius: 10px; font-family: 'Hind', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; border: none; }
  .btn-save { background: var(--green-dark); color: white; }
  .btn-cancel { background: #f0f0f0; color: var(--text); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 11px 22px; border-radius: 10px; font-size: 13px; display: none; z-index: 200; white-space: nowrap; }
  .toast.green { background: var(--green-dark); }
  .toast.red { background: var(--red); }
  .error-banner { background: var(--red-light); color: var(--red); padding: 10px 14px; font-size: 13px; display: none; margin: 10px 14px 0; border-radius: 10px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>&#128200; Hosles Dashboard</h1>
    <p>Malik ka Control Panel</p>
  </div>
  <button class="refresh-btn" onclick="refreshCurrent()">&#8635; Refresh</button>
</div>

<div class="tabs">
  <button class="tab active" id="tab-orders" onclick="switchTab('orders')">&#128230; Orders</button>
  <button class="tab" id="tab-products" onclick="switchTab('products')">&#127381; Products</button>
</div>

<!-- ORDERS PAGE -->
<div class="page active" id="page-orders">
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <p>Orders load ho rahe hain...</p>
  </div>
  <div id="ordersContent" style="display:none">
    <div class="stats-row">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Kul Orders</div></div>
      <div class="stat-card"><div class="num" id="statPending">0</div><div class="lbl">Pending</div></div>
      <div class="stat-card"><div class="num" id="statRevenue">&#8377;0</div><div class="lbl">Kul Rakam</div></div>
    </div>
    <div class="error-banner" id="errorBanner"></div>
    <div class="filters">
      <button class="filter-btn active" onclick="filterOrders('All',this)">Sab</button>
      <button class="filter-btn" onclick="filterOrders('Pending',this)">Pending</button>
      <button class="filter-btn" onclick="filterOrders('Confirmed',this)">Confirmed</button>
      <button class="filter-btn" onclick="filterOrders('Delivered',this)">Delivered</button>
      <button class="filter-btn" onclick="filterOrders('Cancelled',this)">Cancelled</button>
    </div>
    <div class="orders-list" id="ordersList"></div>
    <div class="empty-state" id="emptyState"><p style="font-size:36px">&#128230;</p><p style="margin-top:10px">Koi order nahi mila</p></div>
  </div>
</div>

<!-- PRODUCTS PAGE -->
<div class="page" id="page-products">
  <div class="products-page">
    <div class="add-product-card">
      <h3>&#43; Naya Product Jodo</h3>
      <div class="prod-input-row">
        <input type="text" id="newProdName" placeholder="Product ka naam likho" />
        <input type="number" id="newProdPrice" placeholder="Price &#8377;" min="0" />
        <button class="add-prod-btn" id="addProdBtn" onclick="addProduct()">&#10003; Jodo</button>
      </div>
    </div>
    <div class="products-list-card">
      <div class="prod-list-header">&#128230; Aapke Products</div>
      <div id="productsList"><div class="empty-products"><div class="spinner" style="margin:20px auto"></div></div></div>
    </div>
  </div>
</div>

<!-- Status Modal -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <h3>Status Update Karo</h3>
    <select id="statusSelect">
      <option value="Pending">Pending</option>
      <option value="Confirmed">Confirmed</option>
      <option value="Delivered">Delivered</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveStatus()">Save Karo</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzS2g3oO8TljjIrpXZ-t9xc020VrZ-MvIm2c9HfIWPIL-IcZJA9B38kRTMjQTMNN9lT/exec";
  let allOrders = [];
  let editingOrderId = null;
  let currentTab = 'orders';

  // Use JSONP to avoid CORS issues
  function apiCall(params) {
    return new Promise((resolve, reject) => {
      const cbName = "cb_" + Date.now() + "_" + Math.floor(Math.random()*10000);
      const query = Object.entries({...params, callback: cbName, t: Date.now()})
        .map(([k,v]) => encodeURIComponent(k) + "=" + encodeURIComponent(v)).join("&");
      const script = document.createElement("script");
      const timer = setTimeout(() => {
        cleanup();
        reject(new Error("Timeout"));
      }, 15000);
      window[cbName] = (data) => { cleanup(); resolve(data); };
      function cleanup() { clearTimeout(timer); delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); }
      script.onerror = () => { cleanup(); reject(new Error("Script error")); };
      script.src = API_URL + "?" + query;
      document.head.appendChild(script);
    });
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('page-' + tab).classList.add('active');
    if (tab === 'products') loadProducts();
  }

  function refreshCurrent() {
    if (currentTab === 'orders') loadOrders();
    else loadProducts();
  }

  async function loadOrders() {
    document.getElementById("loadingScreen").style.display = "block";
    document.getElementById("ordersContent").style.display = "none";
    try {
      const data = await apiCall({ action: "getOrders" });
      if (data.success) {
        allOrders = (data.orders || []).reverse();
        updateStats();
        renderOrders(allOrders);
      }
    } catch(e) { showToast("Orders load nahi hue. Refresh karo.", "red"); }
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("ordersContent").style.display = "block";
  }

  async function loadProducts() {
    document.getElementById("productsList").innerHTML = '<div class="empty-products"><div class="spinner" style="margin:20px auto"></div></div>';
    try {
      const data = await apiCall({ action: "getProducts" });
      if (data.success) renderProducts(data.products || []);
      else showToast("Products load nahi hue.", "red");
    } catch(e) { showToast("Products load nahi hue. Refresh karo.", "red"); document.getElementById("productsList").innerHTML = '<div class="empty-products">Load nahi hua. Refresh karo.</div>'; }
  }

  function renderProducts(products) {
    const container = document.getElementById("productsList");
    if (!products || products.length === 0) {
      container.innerHTML = '<div class="empty-products">&#128230; Abhi koi product nahi hai.<br>Upar se pehla product jodo!</div>';
      return;
    }
    container.innerHTML = products.map(p => `
      <div class="product-item">
        <div class="product-name">${p.name}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="product-price">&#8377;${parseFloat(p.price||0).toLocaleString('en-IN')}</div>
          <button class="del-btn" onclick="deleteProduct('${p.id}')">&#128465; Hatao</button>
        </div>
      </div>
    `).join('');
  }

  async function addProduct() {
    const name = document.getElementById("newProdName").value.trim();
    const price = document.getElementById("newProdPrice").value.trim();
    if (!name) return showToast("Product ka naam bharo!", "red");
    if (!price || parseFloat(price) <= 0) return showToast("Sahi price daalo!", "red");
    const btn = document.getElementById("addProdBtn");
    btn.disabled = true; btn.textContent = "Jod raha hai...";
    try {
      const data = await apiCall({ action: "addProduct", name: name, price: parseFloat(price) });
      if (data.success) {
        document.getElementById("newProdName").value = "";
        document.getElementById("newProdPrice").value = "";
        showToast("Product add ho gaya! ✓", "green");
        loadProducts();
      } else { showToast("Nahi hua: " + (data.message||""), "red"); }
    } catch(e) { showToast("Error aaya. Dobara try karo.", "red"); }
    btn.disabled = false; btn.textContent = "✓ Jodo";
  }

  async function deleteProduct(id) {
    if (!confirm("Yeh product delete karna chahte ho?")) return;
    try {
      const data = await apiCall({ action: "deleteProduct", id: id });
      if (data.success) { showToast("Product hata diya!", "green"); loadProducts(); }
      else showToast("Delete nahi hua.", "red");
    } catch(e) { showToast("Error aaya.", "red"); }
  }

  function updateStats() {
    document.getElementById("statTotal").textContent = allOrders.length;
    document.getElementById("statPending").textContent = allOrders.filter(o => o["Status"] === "Pending").length;
    const rev = allOrders.filter(o => o["Status"] !== "Cancelled").reduce((s,o) => s+(parseFloat(o["Total Amount"])||0), 0);
    document.getElementById("statRevenue").textContent = "₹" + Math.round(rev).toLocaleString("en-IN");
  }

  function filterOrders(status, btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderOrders(status === "All" ? allOrders : allOrders.filter(o => o["Status"] === status));
  }

  function renderOrders(orders) {
    const container = document.getElementById("ordersList");
    const empty = document.getElementById("emptyState");
    container.innerHTML = "";
    if (!orders || orders.length === 0) { empty.style.display = "block"; return; }
    empty.style.display = "none";
    orders.forEach(o => {
      const card = document.createElement("div");
      card.className = "order-card";
      const status = o["Status"] || "Pending";
      const items = o["Items"] || "—";
      card.innerHTML = `
        <div class="order-top">
          <div><div class="order-id">${o["Order ID"]||"—"}</div><div class="order-date">${o["Date"]||"—"}</div></div>
          <span class="status-badge status-${status}">${status}</span>
        </div>
        <div class="order-customer">
          <div class="cname">${o["Customer Name"]||"—"}</div>
          <div class="cphone">&#128222; ${o["Customer Phone"]||"—"}</div>
        </div>
        <div class="order-salesman">&#128100; ${o["Salesman"]||"—"}${o["Notes"]?" | "+o["Notes"]:""}</div>
        <div class="order-items">${items.length>120?items.substring(0,120)+"...":items}</div>
        <div class="order-footer">
          <div class="order-total">&#8377;${Math.round(parseFloat(o["Total Amount"])||0).toLocaleString("en-IN")}</div>
          <div class="action-btns">
            <button class="btn-status" onclick='openStatusModal("${o["Order ID"]}","${status}")'>Status</button>
            <button class="btn-bill" onclick='generateBill(${JSON.stringify(o).replace(/'/g,"&#39;")})'>&#128196; Bill</button>
          </div>
        </div>`;
      container.appendChild(card);
    });
  }

  function openStatusModal(orderId, currentStatus) {
    editingOrderId = orderId;
    document.getElementById("statusSelect").value = currentStatus;
    document.getElementById("statusModal").style.display = "flex";
  }

  function closeModal() { document.getElementById("statusModal").style.display = "none"; editingOrderId = null; }

  async function saveStatus() {
    const status = document.getElementById("statusSelect").value;
    try {
      const data = await apiCall({ action: "updateStatus", orderId: editingOrderId, status: status });
      if (data.success) { closeModal(); loadOrders(); showToast("Status update ho gaya!", "green"); }
      else showToast("Update nahi hua.", "red");
    } catch(e) { showToast("Error aaya.", "red"); closeModal(); }
  }

  function showToast(msg, type) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast" + (type ? " " + type : "");
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3000);
  }

  function generateBill(order) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "mm", format: "a5" });
    const teal=[15,110,86],lg=[225,245,238],gray=[100,100,100],black=[26,26,26];
    doc.setFillColor(...teal);doc.rect(0,0,148,28,"F");
    doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(18);doc.text("HOSLES",10,12);
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.text("TAX INVOICE / BILL",10,19);
    doc.setFontSize(8);doc.text("Order ID: "+(order["Order ID"]||""),10,25);doc.text("Date: "+(order["Date"]||""),90,25);
    doc.setFillColor(...lg);doc.rect(0,28,148,22,"F");
    doc.setTextColor(...black);doc.setFont("helvetica","bold");doc.setFontSize(10);doc.text("CUSTOMER",10,36);
    doc.setFont("helvetica","normal");doc.text(order["Customer Name"]||"",10,42);
    doc.setTextColor(...gray);doc.setFontSize(9);doc.text("Phone: "+(order["Customer Phone"]||""),10,47);
    doc.setTextColor(...black);doc.setFont("helvetica","bold");doc.setFontSize(10);doc.text("SALESMAN: "+(order["Salesman"]||""),90,36);
    doc.setDrawColor(...teal);doc.setLineWidth(0.5);doc.line(10,54,138,54);
    doc.setFillColor(...teal);doc.rect(10,56,128,7,"F");
    doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(8);
    doc.text("ITEM",12,61);doc.text("QTY",80,61);doc.text("RATE",100,61);doc.text("AMOUNT",120,61);
    let y=70;doc.setTextColor(...black);doc.setFont("helvetica","normal");doc.setFontSize(9);
    (order["Items"]||"").split(" | ").forEach((line,idx)=>{
      const p=line.match(/^(.+?) x([\d.]+) @₹([\d.]+) = ₹([\d,]+)/);
      if(p){
        if(idx%2===1){doc.setFillColor(245,250,247);doc.rect(10,y-4,128,7,"F");}
        doc.text(p[1].length>28?p[1].substring(0,28):p[1],12,y);
        doc.text(p[2],82,y);doc.text("Rs."+p[3],98,y);
        doc.text("Rs."+parseFloat(p[4].replace(",","")).toLocaleString("en-IN"),120,y);y+=8;
      }
    });
    doc.setDrawColor(...teal);doc.line(10,y,138,y);y+=6;
    doc.setFillColor(...teal);doc.rect(80,y-1,58,10,"F");
    doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(11);
    doc.text("TOTAL: Rs."+Math.round(parseFloat(order["Total Amount"])||0).toLocaleString("en-IN"),83,y+6);
    y+=16;
    if(order["Notes"]){doc.setTextColor(...gray);doc.setFont("helvetica","italic");doc.setFontSize(8);doc.text("Note: "+order["Notes"],10,y);y+=8;}
    y+=6;doc.setTextColor(...gray);doc.setFont("helvetica","normal");doc.setFontSize(8);
    doc.text("Status: "+(order["Status"]||"Pending"),10,y);doc.text("Thank you for your business!",80,y);
    doc.setFillColor(...teal);doc.rect(0,195,148,5,"F");
    doc.save("Bill_"+(order["Order ID"]||"order")+".pdf");
  }

  loadOrders();
</script>
</body>
</html>
