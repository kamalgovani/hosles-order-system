<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard - Hosles</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--green:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--amber:#BA7517;--al:#FAEEDA;--blue:#185FA5;--bl:#E6F1FB;--red:#A32D2D;--rl:#FCEBEB;--text:#1a1a1a;--muted:#666;--border:#e8e8e8;--bg:#f4f6f4}
  body{font-family:'Hind',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .header{background:var(--gd);color:white;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
  .header h1{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800}
  .header p{font-size:11px;opacity:.8;margin-top:1px}
  .refresh-btn{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Hind',sans-serif}
  .tabs{display:flex;background:white;border-bottom:2px solid var(--border)}
  .tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;font-weight:600;font-family:'Hind',sans-serif;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
  .tab.active{color:var(--gd);border-bottom-color:var(--gd)}
  .page{display:none}.page.active{display:block}

  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
  .stat-card{background:white;border-radius:12px;padding:12px;border:1px solid var(--border);text-align:center}
  .stat-card .num{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:var(--gd);line-height:1}
  .stat-card .lbl{font-size:11px;color:var(--muted);margin-top:3px}

  /* Date filter bar */
  .date-bar{padding:0 14px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .date-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Hind',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
  .date-chip.active{background:var(--gd);color:white;border-color:var(--gd)}
  .date-input{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Hind',sans-serif;font-size:13px;color:var(--text);outline:none;cursor:pointer}
  .date-input:focus{border-color:var(--gd)}

  /* Status filter */
  .status-bar{padding:0 14px 10px;display:flex;gap:7px;flex-wrap:wrap}
  .filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'Hind',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted)}
  .filter-btn.active{background:var(--gd);color:white;border-color:var(--gd)}

  /* Orders */
  .orders-list{padding:0 14px 80px}
  .order-card{background:white;border-radius:12px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;display:flex;align-items:stretch}
  .order-left-bar{width:5px;flex-shrink:0}
  .bar-Pending{background:var(--amber)}.bar-Confirmed{background:var(--blue)}.bar-Delivered{background:var(--gd)}.bar-Cancelled{background:var(--red)}
  .order-body{flex:1;padding:13px 14px}
  .order-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .shop-name{font-size:16px;font-weight:700;color:var(--text)}
  .order-amount{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--gd)}
  .order-row2{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .order-meta{font-size:12px;color:var(--muted);line-height:1.6}
  .order-meta span{display:inline-block;margin-right:10px}
  .status-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0}
  .status-Pending{background:var(--al);color:var(--amber)}.status-Confirmed{background:var(--bl);color:var(--blue)}
  .status-Delivered{background:var(--gl);color:var(--gd)}.status-Cancelled{background:var(--rl);color:var(--red)}
  .order-actions{display:flex;gap:7px;justify-content:flex-end}
  .btn-bill{background:var(--gd);color:white;border:none;padding:7px 14px;border-radius:8px;font-family:'Hind',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
  .btn-status{background:white;color:var(--blue);border:1.5px solid var(--blue);padding:7px 14px;border-radius:8px;font-family:'Hind',sans-serif;font-size:12px;font-weight:600;cursor:pointer}

  /* Manage pages */
  .manage-page{padding:14px}
  .add-card{background:white;border-radius:14px;border:1px solid var(--border);padding:18px;margin-bottom:14px}
  .add-card h3{font-family:'Baloo 2',cursive;font-size:16px;font-weight:700;color:var(--gd);margin-bottom:14px}
  .input-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
  .input-row input{flex:1;min-width:110px;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Hind',sans-serif;font-size:14px;outline:none}
  .input-row input:focus{border-color:var(--gd)}
  .green-btn{background:var(--gd);color:white;border:none;padding:11px 18px;border-radius:10px;font-family:'Hind',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
  .green-btn:disabled{background:#aaa;cursor:not-allowed}
  .list-card{background:white;border-radius:14px;border:1px solid var(--border);overflow:hidden}
  .list-header{font-family:'Baloo 2',cursive;font-size:16px;font-weight:700;color:var(--gd);padding:14px 18px 10px;border-bottom:1px solid var(--border)}
  .list-item{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border)}
  .list-item:last-child{border-bottom:none}
  .list-item-name{font-size:15px;font-weight:600}
  .list-item-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .price-tag{font-family:'Baloo 2',cursive;font-size:16px;font-weight:700;color:var(--gd)}
  .del-btn{background:var(--rl);color:var(--red);border:none;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Hind',sans-serif}
  .empty-list{padding:30px;text-align:center;color:var(--muted);font-size:14px}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center;padding:20px}
  .modal{background:white;border-radius:16px;padding:22px;width:100%;max-width:360px}
  .modal h3{font-family:'Baloo 2',cursive;font-size:17px;font-weight:700;margin-bottom:14px;color:var(--gd)}
  .modal select{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:10px;font-family:'Hind',sans-serif;font-size:15px;margin-bottom:14px;outline:none}
  .modal-btns{display:flex;gap:10px}
  .modal-btns button{flex:1;padding:11px;border-radius:10px;font-family:'Hind',sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none}
  .btn-save{background:var(--gd);color:white}.btn-cancel{background:#f0f0f0;color:var(--text)}

  .loading-screen{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);display:none}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:white;padding:11px 22px;border-radius:10px;font-size:13px;display:none;z-index:200;white-space:nowrap}
  .toast.green{background:var(--gd)}.toast.red{background:var(--red)}.toast.gray{background:#333}
  .count-badge{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px}
</style>
</head>
<body>
<div class="header">
  <div><h1>&#128200; Hosles Dashboard</h1><p>Malik ka Control Panel</p></div>
  <button class="refresh-btn" onclick="refreshCurrent()">&#8635; Refresh</button>
</div>
<div class="tabs">
  <button class="tab active" id="tab-orders" onclick="switchTab('orders')">&#128230; Orders</button>
  <button class="tab" id="tab-shops" onclick="switchTab('shops')">&#127978; Shops</button>
  <button class="tab" id="tab-products" onclick="switchTab('products')">&#127381; Products</button>
</div>

<!-- ORDERS PAGE -->
<div class="page active" id="page-orders">
  <div id="loadingScreen" class="loading-screen"><div class="spinner"></div><p>Orders load ho rahe hain...</p></div>
  <div id="ordersContent" style="display:none">
    <div class="stats-row">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Aaj ke Orders</div></div>
      <div class="stat-card"><div class="num" id="statPending">0</div><div class="lbl">Pending</div></div>
      <div class="stat-card"><div class="num" id="statRevenue">&#8377;0</div><div class="lbl">Aaj ka Rakam</div></div>
    </div>

    <!-- Date filter -->
    <div class="date-bar">
      <button class="date-chip active" id="chip-today" onclick="setDateFilter('today',this)">Aaj</button>
      <button class="date-chip" id="chip-yesterday" onclick="setDateFilter('yesterday',this)">Kal</button>
      <button class="date-chip" id="chip-week" onclick="setDateFilter('week',this)">Is Hafte</button>
      <button class="date-chip" id="chip-all" onclick="setDateFilter('all',this)">Sab</button>
      <input type="date" class="date-input" id="customDate" onchange="setDateFilter('custom',null)" title="Koi bhi din chunno" />
    </div>

    <!-- Status filter -->
    <div class="status-bar">
      <button class="filter-btn active" onclick="setStatusFilter('All',this)">Sab</button>
      <button class="filter-btn" onclick="setStatusFilter('Pending',this)">Pending</button>
      <button class="filter-btn" onclick="setStatusFilter('Confirmed',this)">Confirmed</button>
      <button class="filter-btn" onclick="setStatusFilter('Delivered',this)">Delivered</button>
      <button class="filter-btn" onclick="setStatusFilter('Cancelled',this)">Cancelled</button>
    </div>

    <div class="orders-list" id="ordersList"></div>
    <div class="empty-state" id="emptyState"><p style="font-size:36px">&#128230;</p><p style="margin-top:10px;font-size:15px">Is din koi order nahi mila</p></div>
  </div>
</div>

<!-- SHOPS PAGE -->
<div class="page" id="page-shops">
  <div class="manage-page">
    <div class="add-card">
      <h3>&#43; Naya Shop / Customer Jodo</h3>
      <div class="input-row" style="margin-bottom:10px">
        <input type="text" id="newShopName" placeholder="Shop ka naam *" style="flex:2;min-width:160px"/>
      </div>
      <div class="input-row">
        <input type="tel" id="newShopPhone" placeholder="Phone number" maxlength="10"/>
        <input type="text" id="newShopAddress" placeholder="Address (optional)"/>
        <button class="green-btn" id="addShopBtn" onclick="addShop()">&#10003; Jodo</button>
      </div>
    </div>
    <div class="list-card">
      <div class="list-header">&#127978; Shops List</div>
      <div id="shopsList"><div class="empty-list"><div class="spinner" style="margin:20px auto"></div></div></div>
    </div>
  </div>
</div>

<!-- PRODUCTS PAGE -->
<div class="page" id="page-products">
  <div class="manage-page">
    <div class="add-card">
      <h3>&#43; Naya Product Jodo</h3>
      <div class="input-row">
        <input type="text" id="newProdName" placeholder="Product ka naam *" style="flex:2"/>
        <input type="number" id="newProdPrice" placeholder="Price &#8377;" min="0"/>
        <button class="green-btn" id="addProdBtn" onclick="addProduct()">&#10003; Jodo</button>
      </div>
    </div>
    <div class="list-card">
      <div class="list-header">&#128230; Products List</div>
      <div id="productsList"><div class="empty-list"><div class="spinner" style="margin:20px auto"></div></div></div>
    </div>
  </div>
</div>

<!-- Status Modal -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <h3>Status Update Karo</h3>
    <select id="statusSelect">
      <option value="Pending">Pending</option>
      <option value="Confirmed">Confirmed</option>
      <option value="Delivered">Delivered</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveStatus()">Save Karo</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzS2g3oO8TljjIrpXZ-t9xc020VrZ-MvIm2c9HfIWPIL-IcZJA9B38kRTMjQTMNN9lT/exec";
let allOrders=[],editingOrderId=null,currentTab='orders';
let activeDateFilter='today', activeStatusFilter='All';

function apiCall(params){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Date.now()+"_"+Math.floor(Math.random()*9999);
    const q=Object.entries({...params,callback:cb,t:Date.now()}).map(([k,v])=>encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
    const s=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("Timeout"))},15000);
    window[cb]=(d)=>{cleanup();resolve(d)};
    function cleanup(){clearTimeout(timer);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s)}
    s.onerror=()=>{cleanup();reject(new Error("Error"))};
    s.src=API_URL+"?"+q;document.head.appendChild(s);
  });
}

function toLocalDateStr(dateStr){
  // parse date from order string like "28/5/2026, 3:54:52 pm"
  try{
    const parts=dateStr.split(", ")[0].split("/");
    const d=parseInt(parts[0]),m=parseInt(parts[1])-1,y=parseInt(parts[2]);
    return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  }catch(e){return "";}
}

function todayStr(){
  const n=new Date();
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}

function yesterdayStr(){
  const n=new Date();n.setDate(n.getDate()-1);
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}

function weekStartStr(){
  const n=new Date();n.setDate(n.getDate()-6);
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='products') loadProducts();
  if(tab==='shops') loadShops();
}

function refreshCurrent(){
  if(currentTab==='orders') loadOrders();
  else if(currentTab==='shops') loadShops();
  else loadProducts();
}

/* ---- DATE & STATUS FILTER ---- */
function setDateFilter(type, btn){
  activeDateFilter=type;
  document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else{ document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active')); }
  applyFilters();
}

function setStatusFilter(status, btn){
  activeStatusFilter=status;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters(){
  let filtered=[...allOrders];
  // Date filter
  const today=todayStr(), yesterday=yesterdayStr(), weekStart=weekStartStr();
  const customDate=document.getElementById("customDate").value;
  if(activeDateFilter==='today'){
    filtered=filtered.filter(o=>toLocalDateStr(o["Date"]||"")===today);
  } else if(activeDateFilter==='yesterday'){
    filtered=filtered.filter(o=>toLocalDateStr(o["Date"]||"")===yesterday);
  } else if(activeDateFilter==='week'){
    filtered=filtered.filter(o=>{const d=toLocalDateStr(o["Date"]||"");return d>=weekStart&&d<=today;});
  } else if(activeDateFilter==='custom'&&customDate){
    filtered=filtered.filter(o=>toLocalDateStr(o["Date"]||"")===customDate);
  }
  // Status filter
  if(activeStatusFilter!=='All') filtered=filtered.filter(o=>o["Status"]===activeStatusFilter);
  renderOrders(filtered);
  updateStats(filtered);
}

/* ---- ORDERS ---- */
async function loadOrders(){
  document.getElementById("loadingScreen").style.display="block";
  document.getElementById("ordersContent").style.display="none";
  try{
    const d=await apiCall({action:"getOrders"});
    if(d.success){ allOrders=(d.orders||[]).reverse(); applyFilters(); }
  }catch(e){showToast("Orders load nahi hue. Refresh karo.","red");}
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("ordersContent").style.display="block";
}

function getAmt(o){
  // Sheet columns: Order ID, Date, Salesman, Customer Name, Customer Phone, Items, Total Amount, Status, Notes
  // "Total Amount" is column G (index 6 in 0-based object values)
  const vals=Object.values(o);
  // Index 6 = Total Amount
  if(vals[6]!==undefined && vals[6]!==""){const v=parseFloat(vals[6]);if(!isNaN(v))return v;}
  // Fallback: try by key name
  for(const k of Object.keys(o)){
    if(k.trim()==="Total Amount"||k.trim()==="totalAmount"){
      const v=parseFloat(o[k]);if(!isNaN(v))return v;
    }
  }
  return 0;
}

function updateStats(filtered){
  const todayOrders=allOrders.filter(o=>toLocalDateStr(o["Date"]||"")===todayStr());
  document.getElementById("statTotal").textContent=todayOrders.length;
  document.getElementById("statPending").textContent=todayOrders.filter(o=>o["Status"]==="Pending").length;
  const rev=todayOrders.filter(o=>o["Status"]!=="Cancelled").reduce((s,o)=>s+getAmt(o),0);
  document.getElementById("statRevenue").textContent="₹"+Math.round(rev).toLocaleString("en-IN");
}

function renderOrders(orders){
  const c=document.getElementById("ordersList"),e=document.getElementById("emptyState");
  c.innerHTML="";
  if(!orders||orders.length===0){e.style.display="block";return;}
  e.style.display="none";
  orders.forEach((o,idx)=>{
    const status=o["Status"]||"Pending";
    const dateStr=o["Date"]||"—";
    const dateParts=dateStr.split(", ");
    const niceDate=dateParts[0]||"";
    const niceTime=dateParts[1]||"";
    const amt = getAmt(o);
    const amtStr = Math.round(amt).toLocaleString("en-IN");
    // Store order in global for bill access
    window._orderCache = window._orderCache||{};
    window._orderCache[o["Order ID"]] = o;
    const card=document.createElement("div");
    card.className="order-card";
    // Build card without inline JSON to avoid HTML breaking
    const body = document.createElement("div"); body.className="order-body";
    body.innerHTML=`
      <div class="order-row1">
        <div class="shop-name">${o["Customer Name"]||"—"}</div>
        <div class="order-amount">&#8377;${amtStr}</div>
      </div>
      <div class="order-meta">
        <span>&#128197; ${niceDate}</span>
        <span style="margin-left:8px">&#128336; ${niceTime}</span>
      </div>
      <div class="order-meta" style="margin-top:3px">
        <span>&#128203; ${o["Order ID"]||"—"}</span>
        <span style="margin-left:8px">&#128100; ${o["Salesman"]||"—"}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <span class="status-badge status-${status}">${status}</span>
        <div class="order-actions">
          <button class="btn-status" onclick="openStatusModal('${o["Order ID"]}','${status}')">Status</button>
          <button class="btn-bill" onclick="generateBill(window._orderCache['${o["Order ID"]}'])">&#128196; Bill</button>
        </div>
      </div>`;
    const bar = document.createElement("div"); bar.className="order-left-bar bar-"+status;
    card.appendChild(bar); card.appendChild(body);
    c.appendChild(card);
  });
}

function openStatusModal(id,s){editingOrderId=id;document.getElementById("statusSelect").value=s;document.getElementById("statusModal").style.display="flex";}
function closeModal(){document.getElementById("statusModal").style.display="none";editingOrderId=null;}
async function saveStatus(){
  const s=document.getElementById("statusSelect").value;
  try{const d=await apiCall({action:"updateStatus",orderId:editingOrderId,status:s});
    if(d.success){closeModal();loadOrders();showToast("Status update ho gaya!","green");}
    else showToast("Update nahi hua.","red");
  }catch(e){showToast("Error.","red");closeModal();}
}

/* ---- SHOPS ---- */
async function loadShops(){
  document.getElementById("shopsList").innerHTML='<div class="empty-list"><div class="spinner" style="margin:20px auto"></div></div>';
  try{
    const d=await apiCall({action:"getShops"});
    if(d.success) renderShops(d.shops||[]);
  }catch(e){document.getElementById("shopsList").innerHTML='<div class="empty-list">Load nahi hua.</div>';}
}

function renderShops(shops){
  const c=document.getElementById("shopsList");
  if(!shops||shops.length===0){c.innerHTML='<div class="empty-list">&#127978; Koi shop nahi. Upar se jodo!</div>';return;}
  c.innerHTML=shops.map(s=>`
    <div class="list-item">
      <div>
        <div class="list-item-name">${s.name}</div>
        <div class="list-item-sub">${s.phone?'📞 '+s.phone:''}${s.address?' | '+s.address:''}</div>
      </div>
      <button class="del-btn" onclick="deleteShop('${s.id}')">&#128465; Hatao</button>
    </div>`).join('');
}

async function addShop(){
  const name=document.getElementById("newShopName").value.trim();
  const phone=document.getElementById("newShopPhone").value.trim();
  const address=document.getElementById("newShopAddress").value.trim();
  if(!name) return showToast("Shop ka naam bharo!","red");
  const btn=document.getElementById("addShopBtn");btn.disabled=true;btn.textContent="Jod raha hai...";
  try{
    const d=await apiCall({action:"addShop",name,phone,address});
    if(d.success){["newShopName","newShopPhone","newShopAddress"].forEach(id=>document.getElementById(id).value="");showToast("Shop add ho gayi! ✓","green");loadShops();}
    else showToast("Nahi hua.","red");
  }catch(e){showToast("Error.","red");}
  btn.disabled=false;btn.textContent="✓ Jodo";
}

async function deleteShop(id){
  if(!confirm("Yeh shop delete karna chahte ho?")) return;
  try{const d=await apiCall({action:"deleteShop",id});if(d.success){showToast("Shop hata di!","green");loadShops();}else showToast("Delete nahi hua.","red");}
  catch(e){showToast("Error.","red");}
}

/* ---- PRODUCTS ---- */
async function loadProducts(){
  document.getElementById("productsList").innerHTML='<div class="empty-list"><div class="spinner" style="margin:20px auto"></div></div>';
  try{
    const d=await apiCall({action:"getProducts"});
    if(d.success) renderProducts(d.products||[]);
  }catch(e){document.getElementById("productsList").innerHTML='<div class="empty-list">Load nahi hua.</div>';}
}

function renderProducts(products){
  const c=document.getElementById("productsList");
  if(!products||products.length===0){c.innerHTML='<div class="empty-list">Koi product nahi. Upar se jodo!</div>';return;}
  c.innerHTML=products.map(p=>`
    <div class="list-item">
      <div class="list-item-name">${p.name}</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="price-tag">&#8377;${parseFloat(p.price||0).toLocaleString('en-IN')}</div>
        <button class="del-btn" onclick="deleteProduct('${p.id}')">&#128465; Hatao</button>
      </div>
    </div>`).join('');
}

async function addProduct(){
  const name=document.getElementById("newProdName").value.trim();
  const price=document.getElementById("newProdPrice").value.trim();
  if(!name) return showToast("Product ka naam bharo!","red");
  if(!price||parseFloat(price)<=0) return showToast("Sahi price daalo!","red");
  const btn=document.getElementById("addProdBtn");btn.disabled=true;btn.textContent="Jod raha hai...";
  try{
    const d=await apiCall({action:"addProduct",name,price:parseFloat(price)});
    if(d.success){["newProdName","newProdPrice"].forEach(id=>document.getElementById(id).value="");showToast("Product add ho gaya! ✓","green");loadProducts();}
    else showToast("Nahi hua.","red");
  }catch(e){showToast("Error.","red");}
  btn.disabled=false;btn.textContent="✓ Jodo";
}

async function deleteProduct(id){
  if(!confirm("Yeh product delete karna chahte ho?")) return;
  try{const d=await apiCall({action:"deleteProduct",id});if(d.success){showToast("Product hata diya!","green");loadProducts();}else showToast("Delete nahi hua.","red");}
  catch(e){showToast("Error.","red");}
}

/* ---- BILL - MEET ENTERPRISE FORMAT ---- */
function generateBill(order){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:"mm",format:"a4"});
  const W=210;

  function setColor(c){doc.setDrawColor(c[0],c[1],c[2]);}
  function setFill(c){doc.setFillColor(c[0],c[1],c[2]);}
  function setTxt(c){doc.setTextColor(c[0],c[1],c[2]);}
  const black=[0,0,0], gray=[80,80,80], lgray=[180,180,180], white=[255,255,255], ltgray=[240,240,240], ltgray2=[220,220,220], ltgray3=[230,230,230];

  function line(x1,y1,x2,y2,lw){doc.setLineWidth(lw||0.3);setColor(black);doc.line(x1,y1,x2,y2);}
  function rect(x,y,w,h,fill){doc.setLineWidth(0.3);if(fill){setFill(fill);doc.rect(x,y,w,h,"F");setColor(black);doc.rect(x,y,w,h,"S");}else{setColor(black);doc.rect(x,y,w,h,"S");}}
  function txt(t,x,y,size,bold,align,color){
    doc.setFontSize(size||9);doc.setFont("helvetica",bold?"bold":"normal");
    setTxt(color||black);
    doc.text(String(t),x,y,{align:align||"left"});
  }

  // Parse items from order
  const rawItems=(order["Items"]||"").split(" | ");
  const parsedItems=[];
  rawItems.forEach(line=>{
    const m=line.match(/^(.+?) x([\d.]+) @₹([\d.]+) = ₹([\d,.]+)/);
    if(m) parsedItems.push({name:m[1],qty:parseFloat(m[2]),rate:parseFloat(m[3]),amt:parseFloat(m[4].replace(/,/g,""))});
  });

  const grandTotal=getAmt(order);
  const dateStr=(order["Date"]||"").split(",")[0]||"";

  // ---- HEADER ----
  rect(0,0,W,40,[240,240,240]);
  txt("MEET ENTERPRISE",W/2,10,18,true,"center");
  txt("N/169, GREENCITY, SECTOR-26, GANDHINAGAR",W/2,16,9,false,"center",gray);
  txt("Phone : 9824642862",W/2,21,9,false,"center",gray);
  txt("GST INVOICE",W-15,8,10,true,"right");
  txt("Original for Buyer",W-15,14,8,false,"right",gray);

  // horizontal line
  line(10,41,W-10,41,0.5);

  // ---- CUSTOMER + INVOICE INFO BOX ----
  const boxY=43;
  rect(10,boxY,125,32);  // customer box
  rect(135,boxY,65,32);  // invoice info box
  line(135,boxY,135,boxY+32,0.3);

  txt("To, "+( order["Customer Name"]||"").toUpperCase(),13,boxY+6,9,true);
  txt("Ph.No. : "+(order["Customer Phone"]||"—"),13,boxY+12,9);
  txt("D.L.NO. :",13,boxY+18,9);
  txt("State : 00",13,boxY+24,9);

  // right info
  const invNo="INV-"+(order["Order ID"]||"").replace("ORD-","").slice(-6);
  txt("Invoice No. : "+invNo,137,boxY+7,8);
  txt("Date         : "+dateStr,137,boxY+13,8);
  txt("Challan No. :",137,boxY+19,8);
  txt("Sales Man : "+(order["Salesman"]||"").toUpperCase(),137,boxY+25,8);

  // ---- ITEMS TABLE HEADER ----
  const tY=boxY+34;
  rect(10,tY,W-20,7,[220,220,220]);
  doc.setLineWidth(0.3);doc.rect(10,tY,W-20,7,"S");

  // Column positions
  const cols={sn:10,name:18,hsn:68,pack:85,mfg:100,mrp:112,batch:122,exp:135,qty:145,free:153,rate:161,disc:171,namt:181,gst:191,amt:198};

  txt("Sn.",cols.sn+1,tY+5,7,true);
  txt("Item Name",cols.name+1,tY+5,7,true);
  txt("HSN",cols.hsn+1,tY+5,7,true);
  txt("Pack",cols.pack+1,tY+5,7,true);
  txt("Mfg",cols.mfg+1,tY+5,7,true);
  txt("M.R.P.",cols.mrp+1,tY+5,7,true);
  txt("Qty",cols.qty+1,tY+5,7,true);
  txt("Free",cols.free+1,tY+5,7,true);
  txt("Rate",cols.rate+1,tY+5,7,true);
  txt("Disc%",cols.disc+1,tY+5,6,true);
  txt("Gst%",cols.gst+1,tY+5,6,true);
  txt("Amount",cols.amt-1,tY+5,7,true,"right");

  // col vertical lines in header
  [cols.name,cols.hsn,cols.pack,cols.mfg,cols.mrp,cols.qty,cols.free,cols.rate,cols.disc,cols.gst,cols.amt,W-10].forEach(x=>{
    line(x,tY,x,tY+7,0.2);
  });

  // ---- ITEMS ROWS ----
  let rowY=tY+7;
  const rowH=7;
  let totalQty=0, totalFree=0, totalAmt=0;

  parsedItems.forEach((item,i)=>{
    if(i%2===0) rect(10,rowY,W-20,rowH,[250,250,250]);
    doc.setLineWidth(0.15);doc.rect(10,rowY,W-20,rowH,"S");
    [cols.name,cols.hsn,cols.pack,cols.mfg,cols.mrp,cols.qty,cols.free,cols.rate,cols.disc,cols.gst,cols.amt,W-10].forEach(x=>{
      line(x,rowY,x,rowY+rowH,0.15);
    });
    txt(i+1+".",cols.sn+1,rowY+5,8);
    const nameStr=item.name.length>24?item.name.substring(0,24):item.name;
    txt(nameStr,cols.name+1,rowY+5,8);
    txt("-BLA",cols.mfg+1,rowY+5,7,false,null,gray);
    txt(item.rate.toFixed(2),cols.mrp+1,rowY+5,8);
    txt(item.qty,cols.qty+1,rowY+5,8);
    txt("0",cols.free+1,rowY+5,8);
    txt(item.rate.toFixed(2),cols.rate+1,rowY+5,8);
    txt("0.00",cols.disc+1,rowY+5,8);
    txt("0%",cols.gst+1,rowY+5,8);
    txt(item.amt.toFixed(2),cols.amt-1,rowY+5,8,false,"right");
    totalQty+=item.qty; totalAmt+=item.amt;
    rowY+=rowH;
  });

  // empty rows to fill space
  for(let i=parsedItems.length;i<12;i++){
    if(i%2===0) rect(10,rowY,W-20,rowH,[250,250,250]);
    doc.setLineWidth(0.15);doc.rect(10,rowY,W-20,rowH,"S");
    [cols.name,cols.hsn,cols.pack,cols.mfg,cols.mrp,cols.qty,cols.free,cols.rate,cols.disc,cols.gst,cols.amt,W-10].forEach(x=>{
      line(x,rowY,x,rowY+rowH,0.15);
    });
    rowY+=rowH;
  }

  // ---- TOTALS ROW ----
  rect(10,rowY,W-20,7,[230,230,230]);
  doc.rect(10,rowY,W-20,7,"S");
  [cols.name,cols.hsn,cols.pack,cols.mfg,cols.mrp,cols.qty,cols.free,cols.rate,cols.disc,cols.gst,cols.amt,W-10].forEach(x=>{
    line(x,rowY,x,rowY+7,0.2);
  });
  txt(totalQty,cols.qty+1,rowY+5,8,true);
  txt(totalFree,cols.free+1,rowY+5,8,true);
  txt(totalAmt.toFixed(2),cols.amt-1,rowY+5,8,true,"right");
  rowY+=7;

  // ---- TOTAL LABEL ROW ----
  doc.rect(10,rowY,W-20,7,"S");
  txt("TOTAL :",13,rowY+5,9,true);
  rowY+=7;

  // ---- BOTTOM SECTION ----
  const botY=rowY;
  // Left box: transport/outstanding
  rect(10,botY,100,28);
  txt("Transport :",13,botY+6,8);
  txt("L.R.No.   :",13,botY+12,8);
  txt("OUTSTANDING :",13,botY+20,9,true);
  txt("Rs. "+grandTotal.toFixed(2),70,botY+20,9,true);

  // Right box: summary
  rect(110,botY,W-120,28);
  const rCol=W-15;
  txt("Cash Discount Total",112,botY+5,8);    txt("0.00",rCol,botY+5,8,false,"right");
  txt("Scheme Discount Total",112,botY+10,8); txt("0.00",rCol,botY+10,8,false,"right");
  txt("SGST Amount",112,botY+15,8);           txt("0.00",rCol,botY+15,8,false,"right");
  txt("CGST Amount",112,botY+20,8);           txt("0.00",rCol,botY+20,8,false,"right");
  txt("Freight/Pkt Charge",112,botY+25,8);    txt("0.00",rCol,botY+25,8,false,"right");
  rowY=botY+28;

  // Grand Total bar
  rect(110,rowY,W-120,8,[0,0,0]);
  txt("GRAND TOTAL",113,rowY+6,10,true,null,white);
  txt("Rs. "+grandTotal.toFixed(2),rCol,rowY+6,10,true,"right",white);
  rowY+=8;

  // ---- FOOTER ----
  rowY+=4;
  txt("Message:",13,rowY+5,8);
  txt("Remark :",13,rowY+11,8);
  line(10,rowY,W-10,rowY,0.3);
  line(10,rowY+16,W-10,rowY+16,0.3);

  rowY+=18;
  // Terms
  txt("Terms & Conditions",13,rowY+4,8,true);
  txt("Goods once sold will not be taken back or exchanged.",13,rowY+9,7,false,null,gray);
  txt("Bills not paid due date will attract 24% interest.",13,rowY+14,7,false,null,gray);

  // Authorised signatory
  txt("For, MEET ENTERPRISE",W-50,rowY+4,8,true);
  txt("Authorised signatory",W-50,rowY+18,8,false,null,gray);

  // bottom note
  rowY+=22;
  line(10,rowY,W-10,rowY,0.3);
  txt("{ GST "+totalAmt.toFixed(1)+"*0%=0  SGST CESS:0%=0 }",13,rowY+5,7,false,null,gray);
  txt("Software By Marg",W/2,rowY+5,7,false,"center",lgray);

  doc.save("Bill_"+(order["Order ID"]||"order")+".pdf");
}

function showToast(msg,type){
  const el=document.getElementById("toast");el.textContent=msg;
  el.className="toast "+(type||"gray");el.style.display="block";
  setTimeout(()=>el.style.display="none",3000);
}

loadOrders();
</script>
