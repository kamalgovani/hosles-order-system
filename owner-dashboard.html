<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard - Hosles</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Hind:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e8e8e8;
    --bg: #f4f6f4;
  }

  body {
    font-family: 'Hind', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--green-dark);
    color: white;
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-left h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 22px;
    font-weight: 800;
  }

  .header-left p { font-size: 12px; opacity: 0.8; margin-top: 1px; }

  .refresh-btn {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'Hind', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 16px;
  }

  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--border);
    text-align: center;
  }

  .stat-card .num {
    font-family: 'Baloo 2', cursive;
    font-size: 26px;
    font-weight: 800;
    color: var(--green-dark);
    line-height: 1;
  }

  .stat-card .lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
  }

  .filters {
    padding: 0 16px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'Hind', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .filter-btn.active {
    background: var(--green-dark);
    color: white;
    border-color: var(--green-dark);
  }

  .orders-list { padding: 0 16px 80px; }

  .order-card {
    background: white;
    border-radius: 14px;
    border: 1px solid var(--border);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .order-top {
    padding: 14px 16px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .order-id {
    font-family: 'Baloo 2', cursive;
    font-size: 13px;
    font-weight: 700;
    color: var(--green-dark);
  }

  .order-date { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .status-Pending { background: var(--amber-light); color: var(--amber); }
  .status-Confirmed { background: var(--blue-light); color: var(--blue); }
  .status-Delivered { background: var(--green-light); color: var(--green-dark); }
  .status-Cancelled { background: var(--red-light); color: var(--red); }

  .order-customer {
    padding: 0 16px 8px;
  }

  .order-customer .cname {
    font-size: 16px;
    font-weight: 600;
  }

  .order-customer .cphone {
    font-size: 13px;
    color: var(--muted);
  }

  .order-salesman {
    padding: 0 16px 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .order-items {
    background: #fafafa;
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .order-footer {
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
  }

  .order-total {
    font-family: 'Baloo 2', cursive;
    font-size: 20px;
    font-weight: 800;
    color: var(--green-dark);
  }

  .action-btns { display: flex; gap: 8px; }

  .btn-bill {
    background: var(--green-dark);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Hind', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-status {
    background: white;
    color: var(--blue);
    border: 1.5px solid var(--blue);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Hind', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .loading-screen {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    display: none;
  }

  .modal-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    min-height: 100vh;
    justify-content: center;
    align-items: flex-start;
    padding-top: 60px;
  }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 24px;
    width: calc(100% - 40px);
    max-width: 380px;
  }

  .modal h3 {
    font-family: 'Baloo 2', cursive;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--green-dark);
  }

  .modal select {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Hind', sans-serif;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
  }

  .modal-btns { display: flex; gap: 10px; }

  .modal-btns button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-family: 'Hind', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }

  .btn-save { background: var(--green-dark); color: white; }
  .btn-cancel { background: #f0f0f0; color: var(--text); }

  .error-banner {
    background: var(--red-light);
    color: var(--red);
    padding: 12px 16px;
    font-size: 13px;
    display: none;
    margin: 12px 16px 0;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>&#128200; Hosles Dashboard</h1>
    <p>Malik ka Control Panel</p>
  </div>
  <button class="refresh-btn" onclick="loadOrders()">&#8635; Refresh</button>
</div>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <p>Orders load ho rahe hain...</p>
</div>

<div id="mainContent" style="display:none">
  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="lbl">Kul Orders</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statPending">0</div>
      <div class="lbl">Pending</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statRevenue">&#8377;0</div>
      <div class="lbl">Kul Rakam</div>
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterOrders('All', this)">Sab</button>
    <button class="filter-btn" onclick="filterOrders('Pending', this)">Pending</button>
    <button class="filter-btn" onclick="filterOrders('Confirmed', this)">Confirmed</button>
    <button class="filter-btn" onclick="filterOrders('Delivered', this)">Delivered</button>
    <button class="filter-btn" onclick="filterOrders('Cancelled', this)">Cancelled</button>
  </div>

  <div class="orders-list" id="ordersList"></div>
  <div class="empty-state" id="emptyState">
    <p style="font-size:40px">&#128230;</p>
    <p style="font-size:16px; margin-top:12px">Koi order nahi mila</p>
  </div>
</div>

<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <h3>Status Update Karo</h3>
    <select id="statusSelect">
      <option value="Pending">Pending</option>
      <option value="Confirmed">Confirmed</option>
      <option value="Delivered">Delivered</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Raho Jane Do</button>
      <button class="btn-save" onclick="saveStatus()">Save Karo</button>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzS2g3oO8TljjIrpXZ-t9xc020VrZ-MvIm2c9HfIWPIL-IcZJA9B38kRTMjQTMNN9lT/exec";
  let allOrders = [];
  let currentFilter = "All";
  let editingOrderId = null;

  async function loadOrders() {
    document.getElementById("loadingScreen").style.display = "block";
    document.getElementById("mainContent").style.display = "none";
    try {
      const res = await fetch(API_URL + "?action=getOrders&t=" + Date.now());
      const data = await res.json();
      if (data.success) {
        allOrders = data.orders.reverse();
        updateStats();
        renderOrders(allOrders);
        document.getElementById("loadingScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
      }
    } catch (e) {
      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      showError("Data load nahi ho saka. Internet check karo.");
    }
  }

  function updateStats() {
    const total = allOrders.length;
    const pending = allOrders.filter(o => o["Status"] === "Pending").length;
    const revenue = allOrders
      .filter(o => o["Status"] !== "Cancelled")
      .reduce((s, o) => s + (parseFloat(o["Total Amount"]) || 0), 0);
    document.getElementById("statTotal").textContent = total;
    document.getElementById("statPending").textContent = pending;
    document.getElementById("statRevenue").textContent = "₹" + Math.round(revenue).toLocaleString("en-IN");
  }

  function filterOrders(status, btn) {
    currentFilter = status;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filtered = status === "All" ? allOrders : allOrders.filter(o => o["Status"] === status);
    renderOrders(filtered);
  }

  function renderOrders(orders) {
    const container = document.getElementById("ordersList");
    const empty = document.getElementById("emptyState");
    container.innerHTML = "";
    if (orders.length === 0) {
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";
    orders.forEach(o => {
      const card = document.createElement("div");
      card.className = "order-card";
      const status = o["Status"] || "Pending";
      const items = o["Items"] || "—";
      const shortItems = items.length > 80 ? items.substring(0, 80) + "..." : items;
      card.innerHTML = `
        <div class="order-top">
          <div>
            <div class="order-id">${o["Order ID"] || "—"}</div>
            <div class="order-date">${o["Date"] || "—"}</div>
          </div>
          <span class="status-badge status-${status}">${status}</span>
        </div>
        <div class="order-customer">
          <div class="cname">${o["Customer Name"] || "—"}</div>
          <div class="cphone">&#128222; ${o["Customer Phone"] || "—"}</div>
        </div>
        <div class="order-salesman">&#128100; Salesman: ${o["Salesman"] || "—"}${o["Notes"] ? " &nbsp;|&nbsp; Note: " + o["Notes"] : ""}</div>
        <div class="order-items">${shortItems}</div>
        <div class="order-footer">
          <div class="order-total">&#8377;${Math.round(parseFloat(o["Total Amount"]) || 0).toLocaleString("en-IN")}</div>
          <div class="action-btns">
            <button class="btn-status" onclick='openStatusModal("${o["Order ID"]}", "${status}")'>Status</button>
            <button class="btn-bill" onclick='generateBill(${JSON.stringify(o).replace(/'/g, "&#39;")})'>&#128196; Bill</button>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function openStatusModal(orderId, currentStatus) {
    editingOrderId = orderId;
    document.getElementById("statusSelect").value = currentStatus;
    const modal = document.getElementById("statusModal");
    modal.style.display = "flex";
  }

  function closeModal() {
    document.getElementById("statusModal").style.display = "none";
    editingOrderId = null;
  }

  async function saveStatus() {
    const status = document.getElementById("statusSelect").value;
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "updateStatus", orderId: editingOrderId, status })
      });
      const data = await res.json();
      if (data.success) {
        closeModal();
        loadOrders();
      } else {
        showError("Status update nahi hua.");
      }
    } catch (e) {
      showError("Internet check karo.");
      closeModal();
    }
  }

  function generateBill(order) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "mm", format: "a5" });

    const teal = [15, 110, 86];
    const lightGreen = [225, 245, 238];
    const gray = [100, 100, 100];
    const black = [26, 26, 26];

    doc.setFillColor(...teal);
    doc.rect(0, 0, 148, 28, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.text("HOSLES", 10, 12);
    doc.setFontSize(9);
    doc.setFont("helvetica", "normal");
    doc.text("TAX INVOICE / BILL", 10, 19);
    doc.setFontSize(8);
    doc.text("Order ID: " + (order["Order ID"] || ""), 10, 25);
    doc.text("Date: " + (order["Date"] || ""), 90, 25);

    doc.setFillColor(...lightGreen);
    doc.rect(0, 28, 148, 22, "F");
    doc.setTextColor(...black);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.text("CUSTOMER", 10, 36);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(order["Customer Name"] || "", 10, 42);
    doc.setTextColor(...gray);
    doc.setFontSize(9);
    doc.text("Phone: " + (order["Customer Phone"] || ""), 10, 47);

    doc.setTextColor(...black);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.text("SALESMAN: " + (order["Salesman"] || ""), 90, 36);

    doc.setDrawColor(...teal);
    doc.setLineWidth(0.5);
    doc.line(10, 54, 138, 54);

    doc.setFillColor(...teal);
    doc.rect(10, 56, 128, 7, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.text("ITEM", 12, 61);
    doc.text("QTY", 80, 61);
    doc.text("RATE", 100, 61);
    doc.text("AMOUNT", 120, 61);

    const rawItems = order["Items"] || "";
    const itemLines = rawItems.split(" | ");
    let y = 70;
    let totalCalc = 0;

    doc.setTextColor(...black);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);

    itemLines.forEach((line, idx) => {
      if (!line.trim()) return;
      const parts = line.match(/^(.+?) x([\d.]+) @₹([\d.]+) = ₹([\d,]+)/);
      if (parts) {
        const name = parts[1];
        const qty = parts[2];
        const rate = parts[3];
        const amount = parts[4].replace(",", "");
        totalCalc += parseFloat(amount) || 0;
        if (idx % 2 === 1) {
          doc.setFillColor(245, 250, 247);
          doc.rect(10, y - 4, 128, 7, "F");
        }
        doc.text(name.length > 28 ? name.substring(0, 28) : name, 12, y);
        doc.text(qty, 82, y);
        doc.text("Rs." + rate, 98, y);
        doc.text("Rs." + parseFloat(amount).toLocaleString("en-IN"), 120, y);
        y += 8;
      }
    });

    doc.setDrawColor(...teal);
    doc.line(10, y, 138, y);
    y += 6;

    doc.setFillColor(...teal);
    doc.rect(80, y - 1, 58, 10, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text("TOTAL: Rs." + Math.round(parseFloat(order["Total Amount"]) || 0).toLocaleString("en-IN"), 83, y + 6);

    y += 16;
    if (order["Notes"]) {
      doc.setTextColor(...gray);
      doc.setFont("helvetica", "italic");
      doc.setFontSize(8);
      doc.text("Note: " + order["Notes"], 10, y);
      y += 8;
    }

    y += 6;
    doc.setTextColor(...gray);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.text("Status: " + (order["Status"] || "Pending"), 10, y);
    doc.text("Thank you for your business!", 80, y);

    doc.setFillColor(...teal);
    doc.rect(0, 195, 148, 5, "F");

    const fname = "Bill_" + (order["Order ID"] || "order") + ".pdf";
    doc.save(fname);
  }

  function showError(msg) {
    const el = document.getElementById("errorBanner");
    el.textContent = msg;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 5000);
  }

  loadOrders();
</script>
</body>
</html>
